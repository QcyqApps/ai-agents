version: '3.8'

volumes:
  postgres_data:
  n8n_data:
  certbot_www:
  certbot_conf:

networks:
  ecommerce_network:
    driver: bridge

services:
  # ===========================================
  # PostgreSQL Database
  # ===========================================
  postgres:
    image: postgres:16
    container_name: ecommerce-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-n8n_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-n8n_password}
      - POSTGRES_DB=${POSTGRES_DB:-n8n}
      - ECOMMERCE_DB=${ECOMMERCE_DB:-ecommerce_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./ecommerce-customer-service-agent/database/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -h localhost -U ${POSTGRES_USER:-n8n_user} -d ${POSTGRES_DB:-n8n}']
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - ecommerce_network
    # Usunięto expose portów - dostęp tylko wewnętrznie w sieci Docker

  # ===========================================
  # n8n Workflow Automation
  # ===========================================
  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: ecommerce-n8n
    restart: unless-stopped
    environment:
      # Database connection for n8n internal storage
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB:-n8n}
      - DB_POSTGRESDB_USER=${POSTGRES_USER:-n8n_user}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD:-n8n_password}
      # n8n configuration for reverse proxy
      - N8N_HOST=${N8N_HOST:-sliwka.studio}
      - N8N_PORT=5678
      - N8N_PROTOCOL=${N8N_PROTOCOL:-https}
      - N8N_PATH=/n8n/
      - WEBHOOK_URL=${WEBHOOK_URL:-https://sliwka.studio}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - GENERIC_TIMEZONE=${GENERIC_TIMEZONE:-Europe/Warsaw}
      # Security
      - N8N_SECURE_COOKIE=${N8N_SECURE_COOKIE:-true}
      # API keys
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ecommerce_network

  # ===========================================
  # Nginx Reverse Proxy
  # ===========================================
  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./landing-page:/var/www/landing-page:ro
      - ./ecommerce-customer-service-agent/widget:/var/www/ecommerce-widget:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    depends_on:
      - n8n
    networks:
      - ecommerce_network

  # ===========================================
  # Certbot (SSL Certificate Management)
  # ===========================================
  certbot:
    image: certbot/certbot
    container_name: certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
      - ./nginx/ssl:/etc/nginx/ssl
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - ecommerce_network
